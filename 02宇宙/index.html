<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇宙学習ポータル - 中3理科</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050510;
      --text-color: #f1f5f9;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --hover-bg: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* Starry background effect */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-top: 5rem;
      margin-bottom: 4rem;
      padding: 0 1rem;
      animation: fadeInDown 1s ease-out;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 900;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #60a5fa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.05em;
    }

    p.subtitle {
      font-size: 1.2rem;
      color: #94a3b8;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      width: 100%;
      max-width: 1000px;
      padding: 0 2rem;
      margin-bottom: 5rem;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    .app-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 280px;
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 0;
    }

    .app-card:hover {
      transform: translateY(-10px) scale(1.02);
      background: var(--hover-bg);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(96, 165, 250, 0.2);
    }

    .app-card:hover::before {
      opacity: 1;
    }

    .card-content {
      position: relative;
      z-index: 1;
    }

    .icon-wrapper {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      display: inline-block;
      transition: transform 0.4s ease;
    }

    .app-card:hover .icon-wrapper {
      transform: scale(1.1) rotate(5deg);
    }

    .app-card h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .app-card p {
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.6;
    }
    
    .add-new-card {
      border: 2px dashed rgba(255, 255, 255, 0.2);
      background: transparent;
      align-items: center;
      text-align: center;
      justify-content: center;
      cursor: default;
    }
    
    .add-new-card:hover {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.02);
      transform: translateY(-5px);
      box-shadow: none;
    }
    
    .add-new-card .icon-wrapper {
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 0.5rem;
    }
    
    .add-new-card h2 {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.2rem;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <!-- Background Stars -->
  <canvas id="stars-canvas" class="stars"></canvas>

  <header>
    <h1>宇宙学習ポータル</h1>
    <p class="subtitle">中3理科「地球と宇宙」の学習アプリをまとめたホーム画面です。目的に合わせてアプリを選んでください。</p>
  </header>

  <main class="portal-grid">
    <!-- Simulations App -->
    <a href="./space-simulations/index.html" class="app-card">
      <div class="card-content">
        <div class="icon-wrapper">🌍</div>
        <h2>宇宙シミュレーション</h2>
        <p>日周運動、年周運動、日食や月食、四季の変化など、宇宙の動きをインタラクティブに操作して学ぶアプリです。</p>
      </div>
    </a>

    <!-- Books App -->
    <a href="./space-books-app/index.html" class="app-card">
      <div class="card-content">
        <div class="icon-wrapper">📖</div>
        <h2>宇宙の図鑑（教科書）</h2>
        <p>太陽系や恒星、銀河系の知識を美しい写真とともに学べる、スワイプ操作対応のデジタル図鑑アプリです。</p>
      </div>
    </a>
    
    <!-- Placeholder for future apps -->
    <div class="app-card add-new-card">
      <div class="card-content">
        <div class="icon-wrapper">＋</div>
        <h2>Coming Soon...</h2>
        <p style="font-size: 0.9rem; color: rgba(255,255,255,0.4);">今後ここに新しい教材やアプリが<br>追加されていく予定です。</p>
      </div>
    </div>
  </main>

  <script>
    // Simple starfield background
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const stars = Array.from({length: 150}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5,
      alpha: Math.random(),
      speed: Math.random() * 0.05 + 0.01
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
        star.alpha += star.speed;
        if(star.alpha > 1 || star.alpha < 0) {
          star.speed = -star.speed;
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
