<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇宙・理科の本探し</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars"></div>
  <div class="twinkling"></div>

  <header>
    <h1>🚀 宇宙の本を探そう！ 🌌</h1>
    <p>キミの興味に合わせて、おすすめの本を見つけよう！</p>
  </header>

  <main>
    <section class="filters glass-panel">
      <h2>🔍 フィルター</h2>
      
      <div class="filter-group">
        <h3>本の形式（難易度）</h3>
        <div id="format-filters" class="chips-container">
          <!-- JSで生成 -->
        </div>
      </div>

      <div class="filter-group">
        <h3>教科書の単元</h3>
        <div id="chapter-filters" class="chips-container">
          <!-- JSで生成 -->
        </div>
      </div>

      <div class="filter-group">
        <h3>時代（いつのこと？）</h3>
        <div id="period-filters" class="chips-container">
          <!-- JSで生成 -->
        </div>
      </div>

      <div class="filter-group">
        <h3>キーワード（複数選べるよ！）</h3>
        <div id="keyword-filters" class="chips-container">
          <!-- JSで生成 -->
        </div>
      </div>

      <div class="filter-actions">
        <button id="reset-btn" class="btn-secondary">リセット</button>
      </div>
    </section>

    <section class="results">
      <h2>📚 おすすめの本 (<span id="result-count">0</span>冊)</h2>
      <div id="books-container" class="books-grid">
        <!-- JSで生成 -->
      </div>
      <div id="no-results" class="no-results hidden">
        <p>条件に合う本が見つかりませんでした。別のキーワードを試してみてね！</p>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
